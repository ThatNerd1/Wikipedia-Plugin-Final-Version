<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wikipedia Quick Search</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <a class="skip-link" href="#wqs-content">Zum Inhalt springen</a>

  <header class="topbar">
    <button id="wqs-back" class="icon-btn" aria-label="Zurück" title="Zurück (Alt+Pfeil links)" disabled>←</button>
    <h1 id="wqs-heading" class="heading" tabindex="-1">Wikipedia Quick Search</h1>
    <button id="wqs-collapse" class="icon-btn" aria-label="Panel einklappen" title="Panel einklappen">▾</button>
    <button id="wqs-close" class="icon-btn" aria-label="Panel schließen" title="Panel schließen">×</button>
  </header>

  <div class="searchbar" role="search">
    <label class="visually-hidden" for="wqs-search">Wikipedia durchsuchen</label>
    <input id="wqs-search" type="search" placeholder="Wikipedia durchsuchen …"
           autocomplete="off" spellcheck="false" enterkeyhint="search">
    <label class="visually-hidden" for="wqs-lang">Wikipedia-Sprache</label>
    <select id="wqs-lang" title="Wikipedia-Sprache"></select>
  </div>

  <nav class="tabs" aria-label="Bereiche">
    <button id="wqs-tab-results" class="tab" aria-pressed="true">Suche</button>
    <button id="wqs-tab-history" class="tab" aria-pressed="false">Verlauf</button>
    <button id="wqs-tab-saved" class="tab" aria-pressed="false">Gespeichert</button>
    <div class="toggle-wrap">
      <label class="toggle" title="On-Click-Modus: Wörter per Klick nachschlagen">
        <input type="checkbox" id="wqs-onclick" role="switch" aria-label="On-Click-Modus">
        <span class="toggle-label">Klick-Modus</span>
      </label>
    </div>
  </nav>

  <div id="wqs-banner" class="banner" hidden></div>
  <div id="wqs-status" class="status" role="status" aria-live="polite"></div>

  <main id="wqs-content" class="content" tabindex="-1"></main>

  <footer class="attribution">
    <span>Quelle: <a id="wqs-attr-article" href="https://de.wikipedia.org" target="_blank"
      rel="noopener noreferrer">Wikipedia</a> (<span id="wqs-attr-lang">de</span>.wikipedia.org)</span>
    <span>Texte: <a href="https://creativecommons.org/licenses/by-sa/4.0/deed.de" target="_blank"
      rel="noopener noreferrer">CC BY-SA 4.0</a></span>
    <span id="wqs-attr-image-wrap" hidden>Bild: <a id="wqs-attr-image" href="#" target="_blank"
      rel="noopener noreferrer">Datei- &amp; Lizenzinfo</a></span>
  </footer>

  <div id="wqs-collapsed-overlay" hidden>
    <button id="wqs-expand" class="expand-btn">Wikipedia Quick Search ausklappen</button>
  </div>

  <script type="module" src="panel.js"></script>
</body>
</html>
